; PlatformIO Project Configuration File
; ECN Nantrobot - Unit Testing Configuration
; 
; This configuration only supports desktop unit testing with mocked hardware.
; Run tests with: pio test

[platformio]
default_envs = test

[env:test]
platform = native
test_build_src = yes
build_flags = -I test/mocks -DUNIT_TEST
build_src_filter = +<*> -<main.cpp> -<src/build> -<"main copy.cpp">
lib_deps = 
	; Unity test framework (automatically included by PlatformIO)
